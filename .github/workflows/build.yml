name: Build & Push

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/workflows/build.yml"
  workflow_dispatch:
    inputs:
      latest:
        description: "Also tag as latest"
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Resolve Caddy version
        id: meta
        run: |
          VERSION=$(grep -oP 'FROM caddy:\K[^-]+' Dockerfile | head -1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          tags: |
            ghcr.io/somospollo/caddy:${{ steps.meta.outputs.version }}
            ghcr.io/somospollo/caddy:${{ github.sha }}
            ${{ (inputs.latest == true || inputs.latest == '') && 'ghcr.io/somospollo/caddy:latest' || '' }}
